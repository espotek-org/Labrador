# Build + package the Unified_App (SDL3/ImGui) Linux artifacts: AppImage and
# .deb for x86_64 and arm64 (Raspberry Pi), each carrying the firmware hex, udev
# rules, icon and .desktop entry. Also a Raspberry-Pi GLES2 compile check.
#
# Both package jobs build inside an ubuntu:20.04 container so the binaries'
# glibc floor is 2.31 (Ubuntu 20.04+ / Debian 11+ / Pi OS bullseye+).  20.04
# ships wayland 1.18, SDL3's minimum, so the Wayland backend stays enabled --
# libdecor (not packaged on 20.04) is built from source, and SDL dlopens it at
# runtime like the rest of the Wayland stack.  The AppImage binary statically
# links libstdc++/libgcc (so the host's C++ runtime version is irrelevant) and
# libusb; the .deb stays fully dynamic and lets dpkg manage its dependencies.
# Reusable (called by continuous.yml) and directly dispatchable. Uploads
# asset-appimage-<arch> and asset-deb-<arch>.
name: Build Linux

permissions:
  contents: read
  pull-requests: write

on:
  workflow_dispatch:
  workflow_call:

defaults:
  run:
    # Container jobs default to dash, which rejects `set -o pipefail`.
    shell: bash
    working-directory: Unified_App

jobs:
  build-appimage:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            arch: x86_64
            ldarch: x86_64
          - os: ubuntu-22.04-arm
            arch: arm64
            ldarch: aarch64
    runs-on: ${{ matrix.os }}
    container: ubuntu:20.04
    env:
      APPIMAGE_EXTRACT_AND_RUN: 1
      DEBIAN_FRONTEND: noninteractive
    steps:
      # Ordered before checkout: actions/checkout needs git inside the
      # container (and the default working-directory only exists after it).
      - name: Install dependencies
        working-directory: /
        run: |
          apt-get update
          apt-get install -y build-essential git ca-certificates wget bzip2 file \
            pkg-config python3-pip \
            libgl1-mesa-dev libegl1-mesa-dev \
            libx11-dev libxext-dev libxrandr-dev libxcursor-dev libxfixes-dev \
            libxi-dev libxss-dev libxtst-dev libxkbcommon-dev \
            libwayland-dev wayland-protocols libcairo2-dev libdbus-1-dev
          # 20.04's cmake (3.16) and meson (0.53) are too old; ninja to match.
          pip3 install "cmake>=3.22,<4" ninja meson

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # Not packaged on 20.04.  SDL compiles Wayland CSD support against these
      # headers and dlopens libdecor-0.so.0 from the host at runtime, so the
      # build products themselves never link it.
      - name: Build libdecor
        working-directory: /
        run: |
          set -euxo pipefail
          wget -nv https://gitlab.freedesktop.org/libdecor/libdecor/-/archive/0.2.2/libdecor-0.2.2.tar.gz
          tar xzf libdecor-0.2.2.tar.gz
          cd libdecor-0.2.2
          meson setup build --prefix=/usr --buildtype=release -Ddemo=false -Dgtk=disabled
          ninja -C build install

      # Static libusb for the self-contained AppImage binary. --disable-udev:
      # hotplug via netlink and sysfs enumeration, no libudev dependency.
      - name: Build static libusb
        run: |
          set -euxo pipefail
          wget -nv https://github.com/libusb/libusb/releases/download/v1.0.29/libusb-1.0.29.tar.bz2
          tar xjf libusb-1.0.29.tar.bz2
          cd libusb-1.0.29
          ./configure --prefix="$PWD/../libusb-static" --disable-udev \
            --enable-static --disable-shared
          make -j"$(nproc)"
          make install

      - name: Build
        run: |
          export PKG_CONFIG_PATH="$PWD/libusb-static/lib/pkgconfig"
          cmake --preset appimage
          cmake --build --preset appimage

      - name: Verify portability
        run: |
          set -euxo pipefail
          BIN=build/appimage/labrador
          # glibc floor must stay at the container's 2.31.
          objdump -p "$BIN" | grep NEEDED
          MAX=$(objdump -T "$BIN" | grep -oE 'GLIBC_[0-9]+\.[0-9]+(\.[0-9]+)?' | sort -Vu | tail -1)
          echo "max glibc symbol: $MAX"
          test "$(printf '%s\nGLIBC_2.31\n' "$MAX" | sort -V | tail -1)" = "GLIBC_2.31"
          # C++ runtime and libusb are baked in, not dynamic dependencies.
          if objdump -p "$BIN" | grep -E 'NEEDED.*(libstdc\+\+|libgcc_s|libusb)'; then
            echo "ERROR: unexpected dynamic dependency" >&2
            exit 1
          fi
          # Both video backends (and libdecor CSD support) must be compiled in.
          CFG=$(find build/appimage -name SDL_build_config.h | head -1)
          grep -q "#define SDL_VIDEO_DRIVER_WAYLAND 1" "$CFG"
          grep -q "#define SDL_VIDEO_DRIVER_X11 1" "$CFG"
          grep -q "#define HAVE_LIBDECOR_H 1" "$CFG"

      - name: Assemble AppDir
        run: |
          set -euxo pipefail
          APPDIR=AppDir
          rm -rf "$APPDIR"
          mkdir -p "$APPDIR/usr/bin/assets" \
                   "$APPDIR/usr/lib/udev/rules.d" \
                   "$APPDIR/usr/share/applications" \
                   "$APPDIR/usr/share/icons/hicolor/256x256/apps" \
                   "$APPDIR/apprun-hooks"
          cp build/appimage/labrador "$APPDIR/usr/bin/labrador"
          # SDL_GetBasePath() resolves /proc/self/exe -> usr/bin, so assets live there.
          cp -r assets/. "$APPDIR/usr/bin/assets/"
          mkdir -p "$APPDIR/usr/bin/assets/firmware"
          cp firmware/*.hex "$APPDIR/usr/bin/assets/firmware/"
          cp packaging/69-labrador.rules "$APPDIR/usr/lib/udev/rules.d/"
          cp packaging/espotek-labrador.desktop "$APPDIR/usr/share/applications/"
          cp packaging/icon256.png "$APPDIR/usr/share/icons/hicolor/256x256/apps/espotek-labrador.png"
          cp packaging/linux/apprun-hooks/udev-helper.sh "$APPDIR/apprun-hooks/"
          chmod +x "$APPDIR/apprun-hooks/udev-helper.sh"

      - name: Build AppImage
        run: |
          set -euxo pipefail
          LD=linuxdeploy-${{ matrix.ldarch }}.AppImage
          wget -N -nv "https://github.com/linuxdeploy/linuxdeploy/releases/download/1-alpha-20250213-2/${LD}"
          chmod +x "$LD"
          export LINUXDEPLOY_OUTPUT_APP_NAME=Labrador
          export LINUXDEPLOY_OUTPUT_VERSION=$(git rev-parse --short HEAD)
          "./$LD" --appdir=AppDir \
            --executable=AppDir/usr/bin/labrador \
            --desktop-file=AppDir/usr/share/applications/espotek-labrador.desktop \
            --icon-file=AppDir/usr/share/icons/hicolor/256x256/apps/espotek-labrador.png \
            --output=appimage
          mv Labrador*.AppImage "Labrador_${{ matrix.arch }}.AppImage"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: asset-appimage-${{ matrix.arch }}
          path: Unified_App/Labrador_${{ matrix.arch }}.AppImage
          compression-level: 0
          if-no-files-found: error

  build-deb:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            arch: amd64
            name: x86_64
          - os: ubuntu-22.04-arm
            arch: arm64
            name: arm64
    runs-on: ${{ matrix.os }}
    container: ubuntu:20.04
    env:
      DEBIAN_FRONTEND: noninteractive
    steps:
      - name: Install dependencies
        working-directory: /
        run: |
          apt-get update
          apt-get install -y build-essential git ca-certificates wget \
            pkg-config python3-pip \
            libusb-1.0-0-dev libgl1-mesa-dev libegl1-mesa-dev \
            libx11-dev libxext-dev libxrandr-dev libxcursor-dev libxfixes-dev \
            libxi-dev libxss-dev libxtst-dev libxkbcommon-dev \
            libwayland-dev wayland-protocols libcairo2-dev libdbus-1-dev
          pip3 install "cmake>=3.22,<4" ninja meson

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # Same source-built libdecor as the AppImage job: SDL needs the headers
      # to compile Wayland CSD support, then dlopens it from the host.
      - name: Build libdecor
        working-directory: /
        run: |
          set -euxo pipefail
          wget -nv https://gitlab.freedesktop.org/libdecor/libdecor/-/archive/0.2.2/libdecor-0.2.2.tar.gz
          tar xzf libdecor-0.2.2.tar.gz
          cd libdecor-0.2.2
          meson setup build --prefix=/usr --buildtype=release -Ddemo=false -Dgtk=disabled
          ninja -C build install

      - name: Build
        run: |
          cmake --preset linux
          cmake --build --preset linux

      - name: Build .deb
        run: |
          set -euxo pipefail
          VER="2.0.${{ github.run_number }}"
          PKG=pkgroot
          rm -rf "$PKG"
          mkdir -p "$PKG/DEBIAN" \
                   "$PKG/usr/lib/labrador/assets" \
                   "$PKG/usr/bin" \
                   "$PKG/lib/udev/rules.d" \
                   "$PKG/usr/share/applications" \
                   "$PKG/usr/share/icons/hicolor/256x256/apps"
          # Real binary + assets in a private dir; /usr/bin/labrador is a symlink.
          # SDL_GetBasePath() resolves /proc/self/exe to the real dir, so assets
          # are found next to the binary at /usr/lib/labrador/assets.
          install -m 0755 build/linux/labrador "$PKG/usr/lib/labrador/labrador"
          cp -r assets/. "$PKG/usr/lib/labrador/assets/"
          mkdir -p "$PKG/usr/lib/labrador/assets/firmware"
          cp firmware/*.hex "$PKG/usr/lib/labrador/assets/firmware/"
          ln -s ../lib/labrador/labrador "$PKG/usr/bin/labrador"
          cp packaging/69-labrador.rules "$PKG/lib/udev/rules.d/"
          cp packaging/espotek-labrador.desktop "$PKG/usr/share/applications/"
          cp packaging/icon256.png "$PKG/usr/share/icons/hicolor/256x256/apps/espotek-labrador.png"

          INSTALLED_KB=$(du -sk "$PKG/usr" | cut -f1)
          cat > "$PKG/DEBIAN/control" <<EOF
          Package: espotek-labrador
          Version: ${VER}
          Section: electronics
          Priority: optional
          Architecture: ${{ matrix.arch }}
          Maintainer: Chris Esposito <admin@espotek.com>
          Installed-Size: ${INSTALLED_KB}
          Depends: libc6, libstdc++6, libusb-1.0-0, libgl1, libx11-6
          Homepage: https://espotek.com
          Description: driver and GUI for EspoTek Labrador
           The EspoTek Labrador is an open-source board that turns your PC, Raspberry
           Pi, or Android smartphone into a full-featured electronics lab bench,
           complete with oscilloscope, signal generator, and more.
           .
           This package contains the SDL3/ImGui unified GUI plus the firmware images
           it flashes to the board.
          EOF

          cat > "$PKG/DEBIAN/postinst" <<'EOF'
          #!/bin/sh
          set -e
          if command -v udevadm >/dev/null 2>&1; then
              udevadm control --reload-rules || true
              udevadm trigger --subsystem-match=usb || true
          fi
          EOF
          chmod 0755 "$PKG/DEBIAN/postinst"

          dpkg-deb --root-owner-group --build "$PKG" "Labrador_${{ matrix.name }}.deb"
          dpkg-deb --info "Labrador_${{ matrix.name }}.deb"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: asset-deb-${{ matrix.name }}
          path: Unified_App/Labrador_${{ matrix.name }}.deb
          compression-level: 0
          if-no-files-found: error

  # Not released: validates the Raspberry Pi 3 (GLES 2.0) renderer keeps compiling.
  build-pi-gles2-check:
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake ninja-build pkg-config \
            libusb-1.0-0-dev libgles2-mesa-dev libgl1-mesa-dev \
            libx11-dev libxext-dev libxrandr-dev libxcursor-dev libxfixes-dev \
            libxi-dev libxss-dev libxtst-dev libxkbcommon-dev libwayland-dev libegl1-mesa-dev \
            libdecor-0-dev libpipewire-0.3-dev libdbus-1-dev
      - name: Build
        run: |
          cmake --preset pi
          cmake --build --preset pi
