# Build + package the Unified_App (SDL3/ImGui) Android APK. The gradle project
# lives in Unified_App/android and drives the same CMake tree as the desktop
# builds; its release buildType only wires up a signing config when
# keystore.properties exists, so CI produces an unsigned release APK that we
# sign afterwards with apksigner (falling back to a debug APK if no cert secret
# is present). Reusable (called by continuous.yml) and directly dispatchable.
# Uploads asset-apk.
name: Build Android

permissions:
  contents: read
  pull-requests: write

on:
  workflow_dispatch:
  workflow_call:

env:
  # NOTE: secrets are only provided in the original repo (empty in forks).
  ANDROID_CERTIFICATE_BASE64: ${{ secrets.ANDROID_CERTIFICATE_BASE64 }}
  ANDROID_PRIVATE_KEY_BASE64: ${{ secrets.ANDROID_PRIVATE_KEY_BASE64 }}

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: android-actions/setup-android@v3

      # Secrets are the base64 PEM bodies (between the BEGIN/END lines):
      #   -----BEGIN CERTIFICATE-----      (X.509 certificate)  -> cert.cer
      #   -----BEGIN PRIVATE KEY-----       (PKCS#8 private key) -> cert.p8
      # Extract from a .keystore with:
      #   openssl pkcs12 -in path/to/.keystore -info -noenc
      - name: Install certificate and private key
        if: env.ANDROID_CERTIFICATE_BASE64 != '' && env.ANDROID_PRIVATE_KEY_BASE64 != ''
        working-directory: Unified_App/android
        run: |
          echo "$ANDROID_CERTIFICATE_BASE64" | base64 --decode > cert.cer
          echo "$ANDROID_PRIVATE_KEY_BASE64" | base64 --decode > cert.p8

      - name: Build APK
        working-directory: Unified_App/android
        run: |
          set -euxo pipefail
          APK=Labrador-for-Android.apk
          APKSIGNER=$(ls -d "$ANDROID_SDK_ROOT"/build-tools/*/apksigner | sort -V | tail -1)
          if [ -e cert.cer ] && [ -e cert.p8 ]; then
            ./gradlew assembleRelease --no-daemon
            "$APKSIGNER" sign \
              --in app/build/outputs/apk/release/app-release-unsigned.apk \
              --out "$APK" --key cert.p8 --cert cert.cer --verbose
          else
            ./gradlew assembleDebug --no-daemon
            cp app/build/outputs/apk/debug/app-debug.apk "$APK"
          fi

      - name: Upload apk artifacts
        uses: actions/upload-artifact@v4
        with:
          name: asset-apk
          path: Unified_App/android/Labrador-for-Android.apk
          compression-level: 0
          if-no-files-found: error
