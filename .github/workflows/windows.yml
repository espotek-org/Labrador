# Build + package the Unified_App (SDL3/ImGui) Windows installer. Builds with
# MSYS2 MINGW64 (x64) and MINGW32 (x86 - the Qt app always shipped 32-bit;
# don't regress old lab machines) and wraps both in ONE Inno Setup 6
# installer that installs the exe matching the host (FOSS; replaces the old
# proprietary Advanced Installer pipeline). Both exes are fully static
# (MinGW runtime + libusb baked in; only OS DLLs remain dynamic); the
# installer bundles them with the assets + firmware and the USB driver
# installers (whose dpinst32/x86 libusbK.sys already covered 32-bit).
# Reusable (called by continuous.yml) and directly dispatchable. Uploads
# asset-windows-installer.
name: Build Windows

permissions:
  contents: read
  pull-requests: write

on:
  workflow_dispatch:
  workflow_call:

defaults:
  run:
    working-directory: Unified_App

jobs:
  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
        working-directory: Unified_App
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: false
          install: >-
            mingw-w64-x86_64-toolchain
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-ninja
            mingw-w64-x86_64-pkgconf
            mingw-w64-x86_64-libusb
            mingw-w64-i686-toolchain
            mingw-w64-i686-cmake
            mingw-w64-i686-ninja
            mingw-w64-i686-pkgconf
            mingw-w64-i686-libusb

      - name: Build x64
        run: |
          cmake --preset windows
          cmake --build --preset windows

      # Same shell, 32-bit toolchain: MSYSTEM switches the environment.
      - name: Build x86
        env:
          MSYSTEM: MINGW32
        run: |
          cmake --preset windows32
          cmake --build --preset windows32

      - name: Verify static link
        run: |
          set -euxo pipefail
          # Both exes link -static: the import table must hold only Windows
          # system DLLs - no MinGW runtime, no libusb.  (objdump, not ldd:
          # msys2's ldd spawns the target and can't inspect the 32-bit exe
          # from a 64-bit shell.)
          for EXE in build/windows/labrador.exe build/windows32/labrador.exe; do
            echo "== $EXE"
            objdump -x "$EXE" | grep "DLL Name"
            if objdump -x "$EXE" | grep "DLL Name" | grep -iE "libusb|libstdc|libgcc|libwinpthread"; then
              echo "ERROR: unexpected non-system DLL import in $EXE" >&2
              exit 1
            fi
          done
          objdump -f build/windows/labrador.exe   | grep "pei-x86-64"
          objdump -f build/windows32/labrador.exe | grep "pei-i386"
          # Loader-level check (resolves every import); 64-bit exe only, the
          # msys2 shell can't debug a 32-bit process.
          ldd build/windows/labrador.exe

      - name: Assemble staging tree
        run: |
          set -euxo pipefail
          STAGE=packaging/windows/staging
          rm -rf "$STAGE"; mkdir -p "$STAGE/assets" "$STAGE/driver"
          # Both arch exes; the .iss installs the one matching the host as
          # labrador.exe.
          cp build/windows/labrador.exe "$STAGE/labrador64.exe"
          cp build/windows32/labrador.exe "$STAGE/labrador32.exe"
          # Assets (+ firmware) next to the exe; SDL_GetBasePath() = exe dir.
          cp -r assets/. "$STAGE/assets/"
          mkdir -p "$STAGE/assets/firmware"
          cp firmware/*.hex "$STAGE/assets/firmware/"
          # USB driver installers (shared with the Qt build; hardware-generic).
          cp ../Desktop_Interface/build_win/driver/*.exe "$STAGE/driver/"
          # Installer icon next to the .iss (ISCC resolves SetupIconFile relatively).
          cp ../Desktop_Interface/build_win/appicon.ico packaging/windows/appicon.ico
          ls -R "$STAGE" | head -60

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup -y --no-progress

      - name: Build installer
        shell: pwsh
        working-directory: Unified_App/packaging/windows
        run: |
          $ver = "2.0.${{ github.run_number }}"
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" `
            "/DMyAppVersion=$ver" "/DStagingDir=staging" "/DOutputDir=out" `
            "labrador.iss"
          Get-ChildItem out

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: asset-windows-installer
          path: Unified_App/packaging/windows/out/Labrador-for-Windows.exe
          compression-level: 0
          if-no-files-found: error
