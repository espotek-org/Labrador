# Build + package the Unified_App (SDL3/ImGui) Windows installer. The x64 exe
# builds with MSYS2 MINGW64; the x86 exe is cross-compiled from Linux with
# Ubuntu's mingw-w64 (MSYS2 dropped its i686 repo — and the Qt app always
# shipped 32-bit, so 32-bit Windows must not regress). One Inno Setup 6
# installer wraps both and installs the exe matching the host (FOSS; replaces
# the old proprietary Advanced Installer pipeline). Both exes are fully
# static (MinGW runtime + libusb baked in; only OS DLLs remain dynamic); the
# installer bundles them with the assets + firmware and the USB driver
# installers (whose dpinst32/x86 libusbK.sys already covered 32-bit).
# Reusable (called by continuous.yml) and directly dispatchable. Uploads
# asset-windows-installer.
name: Build Windows

permissions:
  contents: read
  pull-requests: write

on:
  workflow_dispatch:
  workflow_call:

defaults:
  run:
    working-directory: Unified_App

jobs:
  # 32-bit exe, cross-compiled from Linux (g++-mingw-w64-i686-posix: msvcrt
  # CRT like MSYS2's MINGW64, and the cross cc1plus is a 64-bit process, so
  # exprtk's template instantiations don't hit a 32-bit compiler ceiling).
  build-win32:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get -o Acquire::Retries=3 install -y \
            g++-mingw-w64-i686-posix ninja-build pkg-config wget make

      - name: Build static libusb (i686 Windows)
        run: |
          set -euxo pipefail
          wget -nv https://github.com/libusb/libusb/releases/download/v1.0.29/libusb-1.0.29.tar.bz2
          tar xjf libusb-1.0.29.tar.bz2
          cd libusb-1.0.29
          ./configure --host=i686-w64-mingw32 --prefix="$PWD/../libusb-win32" \
            --enable-static --disable-shared \
            CC=i686-w64-mingw32-gcc-posix
          make -j"$(nproc)"
          make install

      - name: Build
        run: |
          # PKG_CONFIG_LIBDIR (not _PATH) so host-Linux .pc files can't leak
          # into the cross build; LABRADOR_WIN32_ROOT makes the libusb prefix
          # a find root (see mingw32-cross.cmake).
          export PKG_CONFIG_LIBDIR="$PWD/libusb-win32/lib/pkgconfig"
          export LABRADOR_WIN32_ROOT="$PWD/libusb-win32"
          cmake --preset windows32
          cmake --build --preset windows32

      - name: Verify static link
        run: |
          set -euxo pipefail
          EXE=build/windows32/labrador.exe
          i686-w64-mingw32-objdump -x "$EXE" | grep "DLL Name"
          if i686-w64-mingw32-objdump -x "$EXE" | grep "DLL Name" | grep -iE "libusb|libstdc|libgcc|libwinpthread"; then
            echo "ERROR: unexpected non-system DLL import in $EXE" >&2
            exit 1
          fi
          i686-w64-mingw32-objdump -f "$EXE" | grep "pei-i386"

      - name: Upload x86 exe
        uses: actions/upload-artifact@v4
        with:
          name: win32-exe
          path: Unified_App/build/windows32/labrador.exe
          if-no-files-found: error

  build-windows:
    needs: build-win32
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
        working-directory: Unified_App
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: false
          install: >-
            mingw-w64-x86_64-toolchain
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-ninja
            mingw-w64-x86_64-pkgconf
            mingw-w64-x86_64-libusb

      - name: Download x86 exe
        uses: actions/download-artifact@v4
        with:
          name: win32-exe
          path: Unified_App/win32-exe

      - name: Build x64
        run: |
          cmake --preset windows
          cmake --build --preset windows

      - name: Verify static link
        run: |
          set -euxo pipefail
          # Import table must hold only Windows system DLLs - no MinGW
          # runtime, no libusb.
          objdump -x build/windows/labrador.exe | grep "DLL Name"
          if objdump -x build/windows/labrador.exe | grep "DLL Name" | grep -iE "libusb|libstdc|libgcc|libwinpthread"; then
            echo "ERROR: unexpected non-system DLL import" >&2
            exit 1
          fi
          objdump -f build/windows/labrador.exe | grep "pei-x86-64"
          # Loader-level check (resolves every import).
          ldd build/windows/labrador.exe

      - name: Assemble staging tree
        run: |
          set -euxo pipefail
          STAGE=packaging/windows/staging
          rm -rf "$STAGE"; mkdir -p "$STAGE/assets" "$STAGE/driver"
          # Both arch exes; the .iss installs the one matching the host as
          # labrador.exe.
          cp build/windows/labrador.exe "$STAGE/labrador64.exe"
          cp win32-exe/labrador.exe "$STAGE/labrador32.exe"
          # Assets (+ firmware) next to the exe; SDL_GetBasePath() = exe dir.
          cp -r assets/. "$STAGE/assets/"
          mkdir -p "$STAGE/assets/firmware"
          cp firmware/*.hex "$STAGE/assets/firmware/"
          # USB driver installers (shared with the Qt build; hardware-generic).
          cp ../Desktop_Interface/build_win/driver/*.exe "$STAGE/driver/"
          # Installer icon next to the .iss (ISCC resolves SetupIconFile relatively).
          cp ../Desktop_Interface/build_win/appicon.ico packaging/windows/appicon.ico
          ls -R "$STAGE" | head -60

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup -y --no-progress

      - name: Build installer
        shell: pwsh
        working-directory: Unified_App/packaging/windows
        run: |
          $ver = "2.0.${{ github.run_number }}"
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" `
            "/DMyAppVersion=$ver" "/DStagingDir=staging" "/DOutputDir=out" `
            "labrador.iss"
          Get-ChildItem out

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: asset-windows-installer
          path: Unified_App/packaging/windows/out/Labrador-for-Windows.exe
          compression-level: 0
          if-no-files-found: error
