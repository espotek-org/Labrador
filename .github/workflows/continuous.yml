# Continuous release fan-in for the Unified_App (SDL3/ImGui). Builds every
# platform via the reusable per-platform workflows, then publishes all assets to
# the unified app's OWN rolling tag "unified-continuous".
#
# It deliberately NEVER touches the Qt app's "continuous"/"stable" tags, and the
# release job is gated on the unified-app branch ref so it can't collide with
# the Qt pipeline (which releases from master).
name: Continuous Release

permissions:
  contents: read
  pull-requests: write

on:
  push:
    branches:
      - unified-app
  workflow_dispatch:

concurrency:
  group: unified-continuous-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-android:
    uses: ./.github/workflows/android.yml
    secrets: inherit
  build-linux:
    uses: ./.github/workflows/linux.yml
    secrets: inherit
  build-mac:
    uses: ./.github/workflows/mac.yml
    secrets: inherit
  build-windows:
    uses: ./.github/workflows/windows.yml
    secrets: inherit

  release:
    permissions:
      contents: write
    needs:
      - build-android
      - build-linux
      - build-mac
      - build-windows
    if: github.ref == 'refs/heads/unified-app'
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      TAG: unified-continuous
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: asset-*
          merge-multiple: true
          path: dist

      - name: List assets
        run: ls -la dist

      - name: Publish rolling release
        run: |
          set -euxo pipefail
          NOTES=$(cat <<'EOF'
          Rolling build of the EspoTek Labrador unified app (SDL3/ImGui), built
          from the `unified-app` branch. This is a pre-release; the assets are
          replaced on every push.

          ## macOS

          `Labrador-for-macOS.dmg` — signed + notarized universal build (Apple
          Silicon and Intel). Drag Labrador into `/Applications`.

          ## Windows

          `Labrador-for-Windows.exe` — installer bundling the app, firmware, and
          USB driver. Run it and accept the driver-install prompt at the end.

          ## Linux (including Raspberry Pi)

          - `Labrador_x86_64.AppImage` / `Labrador_arm64.AppImage` — `chmod +x`
            the file, then run it. Installs the udev rules on first launch.
          - `Labrador_x86_64.deb` / `Labrador_arm64.deb` — `sudo dpkg -i <file>`.

          ## Android

          `Labrador-for-Android.apk` — sideload on Android 7.1 "Nougat" or later
          (API level 25).
          EOF
          )
          # Recreate the release each run so stale assets never linger, mirroring
          # the old uploadtool "continuous" behaviour, but on our own tag.
          gh release delete "$TAG" --repo "$GITHUB_REPOSITORY" --cleanup-tag --yes || true
          gh release create "$TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --target "$GITHUB_SHA" \
            --title "Unified App (continuous)" \
            --notes "$NOTES" \
            --prerelease \
            dist/*
